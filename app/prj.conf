# Phase 1 — Network connectivity
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_L2_ETHERNET=y

# Sockets API
CONFIG_NET_SOCKETS=y

# Network buffers (generous for future phases)
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

# Logging
CONFIG_LOG=y
CONFIG_NET_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Shell (optional, useful for debug)
CONFIG_SHELL=y
CONFIG_NET_SHELL=y

# Main stack size
CONFIG_MAIN_STACK_SIZE=4096

# GPIO for LED
CONFIG_GPIO=y
